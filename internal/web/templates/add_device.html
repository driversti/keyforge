{{define "title"}}Add Device{{end}}

{{define "content"}}
<div class="top-bar">
    <h1>Add Device</h1>
</div>

{{if .Error}}
<div class="flash error">{{.Error}}</div>
{{end}}

<div class="card">
    <form method="POST" action="/add">
        <div class="form-group">
            <label for="name">Device Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. macbook-pro" value="{{.Name}}" required>
        </div>

        <div class="form-group">
            <label for="public_key">SSH Public Key</label>
            <textarea id="public_key" name="public_key" placeholder="ssh-ed25519 AAAA... user@host" required>{{.PublicKey}}</textarea>
        </div>

        <div class="form-group">
            <label for="tags">Tags (comma-separated)</label>
            <input type="text" id="tags" name="tags" placeholder="e.g. work, laptop" value="{{.Tags}}">
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="accepts_ssh" value="true" {{if .AcceptsSSH}}checked{{end}}>
                Accepts SSH connections
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Register Device</button>
    </form>
</div>
{{end}}
