{{define "title"}}Authorized Keys{{end}}

{{define "content"}}
<div class="top-bar">
    <h1>Authorized Keys <span class="key-count">({{.KeyCount}} active)</span></h1>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Public Keys</h2>
        <button class="btn btn-ghost btn-sm" onclick="copyKeys()">Copy to Clipboard</button>
    </div>
    <div class="keys-output" id="keys-output">{{.Keys}}</div>
</div>

<div class="card">
    <div class="card-header">
        <h2 class="card-title">Quick Install</h2>
    </div>
    <p class="stat-label">Add all active keys to your server's authorized_keys file:</p>
    <div class="keys-output">curl -s {{.ServerURL}}/api/v1/authorized_keys >> ~/.ssh/authorized_keys</div>
</div>

<script>
function copyKeys() {
    const output = document.getElementById('keys-output');
    const text = output.textContent;
    navigator.clipboard.writeText(text).then(function() {
        const btn = document.querySelector('.copy-btn');
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = original; }, 2000);
    });
}
</script>
{{end}}
