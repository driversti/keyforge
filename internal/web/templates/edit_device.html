{{define "title"}}Edit Device{{end}}
{{define "content"}}
<div class="top-bar">
    <h1>Edit Device: {{.Device.Name}}</h1>
</div>

{{if .Error}}
<div class="flash flash-error">{{.Error}}</div>
{{end}}

<div class="card">
    <form method="POST" action="/devices/{{.Device.ID}}/edit">
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-input" value="{{.Device.Name}}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Tags (comma-separated)</label>
            <input type="text" name="tags" class="form-input" value="{{.TagsString}}">
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="accepts_ssh" value="true" {{if .Device.AcceptsSSH}}checked{{end}}>
                Accepts SSH connections
            </label>
        </div>

        <div class="form-group">
            <label class="form-label">Public Key</label>
            <div class="keys-output" style="max-height:80px">{{.Device.PublicKey}}</div>
        </div>

        <div class="form-group">
            <label class="form-label">Fingerprint</label>
            <div class="fingerprint">{{.Device.Fingerprint}}</div>
        </div>

        <div style="display:flex;gap:var(--space-2)">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/devices" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{{end}}
