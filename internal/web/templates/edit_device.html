{{define "title"}}Edit Device{{end}}
{{define "content"}}
<div class="top-bar">
    <h1>Edit Device: {{.Device.Name}}</h1>
</div>

{{if .Error}}
<div class="flash error">{{.Error}}</div>
{{end}}

<div class="card">
    <form method="POST" action="/devices/{{.Device.ID}}/edit">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{.Device.Name}}" required>
        </div>

        <div class="form-group">
            <label>Tags (comma-separated)</label>
            <input type="text" name="tags" value="{{.TagsString}}">
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="accepts_ssh" value="true" {{if .Device.AcceptsSSH}}checked{{end}}>
                Accepts SSH connections
            </label>
        </div>

        <div class="form-group">
            <label>Public Key</label>
            <div class="keys-output" style="max-height:80px">{{.Device.PublicKey}}</div>
        </div>

        <div class="form-group">
            <label>Fingerprint</label>
            <div style="font-family:monospace;font-size:0.85rem;color:var(--text-muted)">{{.Device.Fingerprint}}</div>
        </div>

        <div style="display:flex;gap:0.5rem">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/devices" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{{end}}
